model_list:
  # The corp vLLM only exposes one model (`GLM-5.1-AWQ` — confirmed via
  # GET /v1/models). Rewrite every inbound model name to that upstream
  # model.
  #
  # `openai/` + `use_responses_api: false` sends the legacy
  # `/chat/completions` HTTP shape that direct curl uses (and that the
  # corp vLLM accepts cleanly). `hosted_vllm/` did the same path but
  # added wrapper headers/body fields that the corp's ingress 503'd
  # ("No server is available to handle this request" from what looks
  # like a k8s ingress default 503 page). openai/ keeps the wire
  # format closer to what works in direct curls.
  - model_name: "*"
    litellm_params:
      model: "hosted_vllm/GLM-5.1-AWQ"
      api_base: "os.environ/CORP_LLM_ENDPOINT"
      api_key: "os.environ/CORP_LLM_AUTH_TOKEN"
      # Claude Code sends max_tokens=64000 (Claude Opus default).
      # GLM-5.1-AWQ has a 65536-token total context window, so any
      # non-trivial prompt + 64000 output overshoots. Cap the
      # per-deployment max_tokens to a value that leaves headroom
      # for the prompt. 4096 covers any realistic demo answer.
      # (The CorpLlmGuardrail pre_call also clamps for belt+braces.)
      max_tokens: 4096
litellm_settings:
  # Reference a module-level INSTANCE (`guardrail`), not the class.
  # litellm's get_instance_fn returns whatever object lives at the path
  # and then calls methods on it. A class fails ("missing self");
  # an instance works. See litellm's own custom_callbacks1.py example.
  callbacks: ["corp_llm_gateway._demo_guardrail.guardrail"]
  # Claude Code sends modern Anthropic params (e.g. `context_management`)
  # that the corp vLLM doesn't accept. Drop unsupported params silently
  # rather than 400-ing the request. The chat completion itself still
  # works; only the unsupported metadata params get stripped.
  drop_params: true
  json_logs: true
