model_list:
  # The corp vLLM only exposes one model (`GLM-5.1-AWQ` — confirmed via
  # GET /v1/models). Rewrite every inbound model name to that single
  # upstream model. Drop the `openai/*` passthrough — passing
  # `claude-sonnet-4-5` straight through earns a vLLM model-not-found.
  - model_name: "*"
    litellm_params:
      model: "openai/GLM-5.1-AWQ"
      api_base: "os.environ/CORP_LLM_ENDPOINT"
      api_key: "os.environ/CORP_LLM_AUTH_TOKEN"
litellm_settings:
  callbacks: ["corp_llm_gateway.litellm_hook.CorpLlmGuardrail"]
  json_logs: true
