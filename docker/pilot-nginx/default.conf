# Pilot-only reverse proxy — single public entry point in front of BOTH gateway
# web apps:
#   :80   → litellm:4000       (gateway API /v1/..., /health/..., admin UI /ui)
#   :3000 → langfuse-web:3000  (Langfuse OSS observability UI + /api ingestion)
# Both are full web apps served at root `/`, and Langfuse v3 doesn't support
# sub-path hosting, so they get distinct nginx listeners rather than one port with
# path routing. Production would terminate TLS here; the pilot is plain HTTP over
# the internal compose network.
#
# corp-llm-gateway header invariants (CLAUDE.md #3 / #4):
#  - The developer's `Authorization: Bearer` (BYOK) and `X-Corp-Auth` are passed
#    THROUGH to litellm untouched — nginx forwards request headers by default, and
#    we neither rewrite nor log them (the default access-log format records the
#    request line + status only, never Authorization / X-Corp-Auth).

# WebSocket/SSE upgrade passthrough for the Langfuse (Next.js) UI. `map` is valid
# in the http context; conf.d/*.conf is included there.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # LLM request/response payloads can be large. nginx must not be the bottleneck;
    # the gateway still enforces its own payload-size policy (M1-11) downstream.
    client_max_body_size 25m;

    # Docker embedded DNS — re-resolve `litellm` at runtime so a container restart
    # (new IP) doesn't wedge nginx with a stale upstream until reload.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        # Variable upstream forces per-request DNS resolution via the resolver above.
        set $upstream http://litellm:4000;
        proxy_pass $upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Streaming (SSE) chat completions: no buffering, allow long responses.
        proxy_buffering    off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

server {
    listen 3000;
    server_name _;

    # Langfuse batch ingestion posts sizable event payloads; keep parity with :80.
    client_max_body_size 25m;

    # Same runtime re-resolution so a langfuse-web restart (new IP) doesn't wedge
    # nginx with a stale upstream. The variable upstream also lets nginx START
    # before langfuse-web is up (it resolves at request time, not config load).
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $upstream http://langfuse-web:3000;
        proxy_pass $upstream$request_uri;

        proxy_http_version 1.1;
        # Host must stay the client-facing host:port (localhost:3000) so it matches
        # langfuse-web's NEXTAUTH_URL — otherwise NextAuth rejects the callback.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js WebSocket/SSE upgrade passthrough.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering    off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
