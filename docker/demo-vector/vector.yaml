api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  litellm_logs:
    type: docker_logs
    # docker_logs matches `include_containers` by name PREFIX, not by
    # substring. Compose names the container `corp-llm-gateway-litellm-1`,
    # so `["litellm"]` doesn't match and vector EXCLUDES it. Use the
    # full compose-prefixed name.
    include_containers: ["corp-llm-gateway-litellm"]

transforms:
  # Try to parse each docker log line as JSON. LiteLLM emits both
  # structured JSON (its own wrappers + our AuditEvent records) and
  # plain-text uvicorn access logs. Use the non-strict form (no `!`)
  # so plain text doesn't blow up the event — we filter to audit
  # shape next.
  parse:
    type: remap
    inputs: ["litellm_logs"]
    source: |
      parsed, err = parse_json(.message)
      if err == null {
        . = parsed
      } else {
        # Mark as unparsable so the filter below drops it.
        ._unparsable = true
      }

  # NEVER-fields gate (mirrors src/corp_llm_gateway/audit/invariants.py).
  # Defence-in-depth: even if a future regression smuggles original/
  # mapping data into a forwarded event, drop it here before it hits
  # Langfuse.
  never_fields_gate:
    type: filter
    inputs: ["parse"]
    condition: |
      !exists(.mapping) &&
      !exists(.mapping_table) &&
      !exists(.pairs) &&
      !exists(.original_content) &&
      !exists(.unredacted_content) &&
      !exists(.pre_sanitization) &&
      !exists(.replace_md) &&
      !exists(.rule_values) &&
      !exists(.x_corp_auth) &&
      !exists(."X-Corp-Auth") &&
      !exists(.corp_token) &&
      !exists(.authorization) &&
      !exists(.Authorization) &&
      !exists(.cookie) &&
      !exists(.Cookie) &&
      !exists(.set_cookie) &&
      !exists(."Set-Cookie")

  # Keep ONLY events shaped like AuditEvent (StdoutSink output). Drop
  # litellm's own JSON wrappers, parse failures, and anything else.
  # AuditEvent is uniquely identified by having both `request_id` and
  # `redaction_count`.
  audit_only:
    type: filter
    inputs: ["never_fields_gate"]
    condition: |
      !exists(._unparsable) &&
      exists(.request_id) &&
      exists(.redaction_count)

  # Build the full Langfuse envelope `{"batch":[<one trace>]}` and
  # encode it as a single JSON STRING on `.message`. The HTTP sink
  # below uses codec=text so the body is exactly that string — no
  # wrapper array, no double-encoding.
  to_langfuse_schema:
    type: remap
    inputs: ["audit_only"]
    source: |
      audit = .
      envelope = {
        "batch": [{
          "id": audit.request_id,
          "type": "trace-create",
          "timestamp": audit.timestamp,
          "body": {
            "id": audit.request_id,
            "name": "gateway-request",
            "timestamp": audit.timestamp,
            "userId": audit.user_id,
            "metadata": audit,
          }
        }]
      }
      . = { "message": encode_json(envelope) }

sinks:
  langfuse:
    type: http
    inputs: ["to_langfuse_schema"]
    uri: "${CORP_LANGFUSE_URL:-http://langfuse-web:3000}/api/public/ingestion"
    method: "post"
    encoding:
      codec: "text"
      only_fields: ["message"]
    # One event per HTTP POST. Each .message is already a complete
    # `{"batch":[...]}` JSON string envelope.
    batch:
      max_events: 1
    request:
      headers:
        Content-Type: "application/json"
    auth:
      strategy: "basic"
      user: "${LANGFUSE_PUBLIC_KEY}"
      password: "${LANGFUSE_SECRET_KEY}"
