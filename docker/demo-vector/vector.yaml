sources:
  litellm_logs:
    type: docker_logs
    include_containers: ["litellm"]

transforms:
  parse:
    type: remap
    inputs: ["litellm_logs"]
    source: |
      . = parse_json!(.message)
  never_fields_gate:                  # mirrors src/corp_llm_gateway/audit/invariants.py NEVER_FIELDS exactly
    type: filter
    inputs: ["parse"]
    condition: |
      !exists(.mapping) &&
      !exists(.mapping_table) &&
      !exists(.pairs) &&
      !exists(.original_content) &&
      !exists(.unredacted_content) &&
      !exists(.pre_sanitization) &&
      !exists(.replace_md) &&
      !exists(.rule_values) &&
      !exists(.x_corp_auth) &&
      !exists(."X-Corp-Auth") &&
      !exists(.corp_token) &&
      !exists(.authorization) &&
      !exists(.Authorization) &&
      !exists(.cookie) &&
      !exists(.Cookie) &&
      !exists(.set_cookie) &&
      !exists(."Set-Cookie")
  to_langfuse_schema:
    type: remap
    inputs: ["never_fields_gate"]
    source: |
      # Langfuse v3 ingestion expects { type, id, timestamp, body }
      # Trace events: type="trace-create"; Observations: type="observation-create"
      .type = if exists(.span_kind) && .span_kind == "trace" { "trace-create" } else { "observation-create" }
      .id = .request_id
      .timestamp = .ts
      .body = .
      del(.message)

sinks:
  langfuse:
    type: http
    inputs: ["to_langfuse_schema"]
    uri: "http://langfuse-web:3000/api/public/ingestion"
    encoding: { codec: "json" }
    auth:
      strategy: "basic"
      user: "${LANGFUSE_PUBLIC_KEY}"
      password: "${LANGFUSE_SECRET_KEY}"
