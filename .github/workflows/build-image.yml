name: build-gateway-image

# Builds the corp-llm-gateway proxy image (Dockerfile.gateway) with the sanitizing
# (NER) stack baked in, and pushes it to GHCR. Two variants are built in parallel:
#   - ru-en : full bilingual NER (Natasha RU + spaCy EN + en_core_web_md model)
#             -> ghcr.io/<owner>/corp-llm-gateway:<version> / :latest
#   - en    : EN-only NER (spaCy + model, no RU stack) — smaller, non-RU deploys
#             -> ghcr.io/<owner>/corp-llm-gateway:<version>-en / :latest-en
# The model wheel is fetched from github.com at build time, so this runs on GitHub
# Actions cloud runners (which have outbound internet) rather than an air-gapped build.

on:
  push:
    tags:
      - "v*"
  pull_request:
    # Regression build only (no push) when the build inputs change.
    paths:
      - "Dockerfile.gateway"
      - ".github/workflows/build-image.yml"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      en_model_version:
        description: "spaCy EN model version to bake (NER-version knob)"
        required: false
        default: "3.8.0"
      litellm_version:
        description: "litellm base image tag (pin; 'main-stable' floats)"
        required: false
        default: "v1.85.0"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: ru-en
            suffix: "" # default full image: :<version> / :latest
          - profile: en
            suffix: "-en" # EN-only variant: :<version>-en / :latest-en
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # PRs are regression-build-only; forks can't write packages anyway.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            suffix=${{ matrix.suffix }},onlatest=true
          # latest only from final release tags — not prereleases (v1.0.0-rc.N).
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
            type=sha,format=short

      - name: Build and push (${{ matrix.profile }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          platforms: linux/amd64
          # LITELLM_VERSION pins the base for reproducible release images
          # (Dockerfile default 'main-stable' floats); demo-stack-validated.
          build-args: |
            NER_PROFILE=${{ matrix.profile }}
            EN_MODEL_VERSION=${{ inputs.en_model_version || '3.8.0' }}
            LITELLM_VERSION=${{ inputs.litellm_version || 'v1.85.0' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-profile cache so the two matrix legs don't clobber each other.
          cache-from: type=gha,scope=${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.profile }}
