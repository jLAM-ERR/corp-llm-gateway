name: ci

# Gates every PR on the real suite: ruff (lint job) + the full pytest suite on
# Python 3.12 with the ner/postgres/oidc extras (test job) — this is the
# authoritative 3.12 run CLAUDE.md refers to, including NER, RS256/RBAC crypto,
# and the helm render tests.

on:
  pull_request:
  push:
    branches: ["release/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      # ruff pin mirrors the [dev] extra in pyproject.toml and .pre-commit-config.yaml
      # (0.15.14) — deliberate duplication so this job stays a fast, standalone install.
      - run: pip install ruff==0.15.14
      - run: ruff check src tests && ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      # Unconditional: tests/helm render tests are skipif-helm — without this step
      # they'd silently skip instead of gating the chart.
      - uses: azure/setup-helm@v4
      - run: pip install -e ".[dev,ner,postgres,oidc]"
      # Model wheel version mirrors Dockerfile.gateway's EN_MODEL_VERSION default
      # and build-image.yml's default (3.8.0) — keep all three in sync.
      - run: pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_md-3.8.0/en_core_web_md-3.8.0-py3-none-any.whl
      - run: PYTHONPATH=src pytest tests/ -q
