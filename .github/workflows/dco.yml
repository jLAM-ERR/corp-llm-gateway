name: dco

# Every PR commit must carry a "Signed-off-by:" trailer (git commit -s).
# Per LEGAL/CLA.md §6, the sign-off constitutes acceptance of the CLA —
# this check is the enforcement point (no signatures, no bots to install).

on:
  pull_request:

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Signed-off-by on all PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer. Amend with: git commit --amend -s (see CONTRIBUTING.md)"
              missing=1
            fi
          done
          exit $missing
