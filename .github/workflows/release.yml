name: github-release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "release ${GITHUB_REF_NAME} already exists — nothing to do"
            exit 0
          fi
          prerelease=""
          case "${GITHUB_REF_NAME}" in *-*) prerelease="--prerelease" ;; esac
          # $prerelease deliberately unquoted (empty-or-flag word splitting)
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            $prerelease
