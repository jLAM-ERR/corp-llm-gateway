{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "corp-llm-gateway.fullname" . }}-env
  labels:
    {{- include "corp-llm-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Sensitive env contract, consumed by both containers via `envFrom`. Defaults
  # in values.yaml are empty so nothing sensitive is committed. In real clusters
  # set `existingSecret` to a Vault / external-secrets-managed Secret (this
  # template then renders nothing) or fill `.Values.secret.*` from a NON-committed
  # values file / --set.
  {{- range $key, $val := .Values.secret }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.caBundle.enabled .Values.caBundle.content (not .Values.caBundle.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "corp-llm-gateway.fullname" . }}-ca
  labels:
    {{- include "corp-llm-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  ca-bundle.pem: |
    {{- .Values.caBundle.content | nindent 4 }}
{{- end }}
