{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "corp-llm-gateway.fullname" . }}-egress
  labels:
    {{- include "corp-llm-gateway.labels" . | nindent 4 }}
spec:
  # Plan ref: M5-3. Only the gateway pods are permitted to egress to
  # Anthropic / OpenAI IP ranges. All other pods in the cluster fall
  # through to the deny-by-default cluster policy (or get sinkholed by
  # CoreDNS first per M5-1).
  podSelector:
    matchLabels:
      {{- include "corp-llm-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # DNS to kube-dns
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Anthropic / OpenAI public ranges
    {{- range .Values.networkPolicy.upstreamCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    # Corp internal services (Redis, Postgres, corp LLM, Langfuse, S3)
    {{- range .Values.networkPolicy.corpInternalCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    {{- end }}
{{- end }}
