apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "corp-llm-gateway.fullname" . }}-vector
  labels:
    {{- include "corp-llm-gateway.labels" . | nindent 4 }}
data:
  vector.yaml: |
    sources:
      gateway_logs:
        type: stdin

    transforms:
      # Parse each stdin line as JSON. The gateway emits AuditEvent JSON
      # (StdoutSink) interleaved with litellm's own JSON wrappers and plain-text
      # uvicorn access logs. Non-strict parse (no `!`) so a plain-text line does
      # not abort the event — it is flagged `_unparsable` and dropped by
      # `audit_only` below.
      parse:
        type: remap
        inputs: [gateway_logs]
        source: |
          parsed, err = parse_json(.message)
          if err == null {
            . = parsed
          } else {
            ._unparsable = true
          }

      # NEVER-fields gate. Mirrors src/corp_llm_gateway/audit/invariants.py
      # (NEVER_FIELDS) and docs/audit-schema.md EXACTLY, including header-style
      # case variants. Defence-in-depth: drop any record carrying mapping /
      # original / credential data before it can reach a sink.
      enforce_audit_schema:
        type: filter
        inputs: [parse]
        condition: |
          !exists(.mapping) &&
          !exists(.mapping_table) &&
          !exists(.pairs) &&
          !exists(.original_content) &&
          !exists(.unredacted_content) &&
          !exists(.pre_sanitization) &&
          !exists(.replace_md) &&
          !exists(.rule_values) &&
          !exists(.x_corp_auth) &&
          !exists(."X-Corp-Auth") &&
          !exists(.corp_token) &&
          !exists(.authorization) &&
          !exists(.Authorization) &&
          !exists(.cookie) &&
          !exists(.Cookie) &&
          !exists(.set_cookie) &&
          !exists(."Set-Cookie")

      # Keep ONLY AuditEvent-shaped records: drop parse failures (plain-text
      # uvicorn lines) and litellm's own JSON wrappers, so neither Langfuse nor
      # the durable S3 store is polluted with non-audit events. An AuditEvent is
      # uniquely identified by having both `request_id` and `redaction_count`.
      audit_only:
        type: filter
        inputs: [enforce_audit_schema]
        condition: |
          !exists(._unparsable) &&
          exists(.request_id) &&
          exists(.redaction_count)

      to_langfuse:
        type: remap
        inputs: [audit_only]
        source: |
          # Reshape our flat audit record into Langfuse's batch ingestion
          # event format (one trace + one generation per request).
          .__lf = .
          . = {
            "batch": [
              {
                "id": uuid_v4(),
                "type": "trace-create",
                "timestamp": .__lf.timestamp,
                "body": {
                  "id": .__lf.request_id,
                  "name": "corp-llm-gateway",
                  "userId": .__lf.user_id,
                  "metadata": {
                    "team_id": .__lf.team_id,
                    "redaction_count": .__lf.redaction_count,
                    "cache_a_hit": .__lf.cache_a_hit,
                    "finding_label_counts": .__lf.finding_label_counts,
                    "gateway_version": .__lf.gateway_version,
                    "status": .__lf.status,
                    "error_code": .__lf.error_code,
                    "block_reason": .__lf.block_reason
                  },
                  "tags": [
                    join(["team:", .__lf.team_id]),
                    join(["provider:", .__lf.provider])
                  ]
                }
              },
              {
                "id": uuid_v4(),
                "type": "generation-create",
                "timestamp": .__lf.timestamp,
                "body": {
                  "id": uuid_v4(),
                  "traceId": .__lf.request_id,
                  "name": join([.__lf.provider, "-call"]),
                  "model": .__lf.model,
                  "startTime": .__lf.timestamp,
                  "usage": {
                    "input": .__lf.prompt_token_count,
                    "output": .__lf.completion_token_count,
                    "total": .__lf.prompt_token_count + .__lf.completion_token_count,
                    "unit": "TOKENS"
                  },
                  "metadata": {
                    "latency_ms": .__lf.latency_ms,
                    "corp_llm_latency_ms": .__lf.corp_llm_latency_ms,
                    "pre_pass_latency_ms": .__lf.pre_pass_latency_ms
                  }
                }
              }
            ]
          }
          del(.__lf)

    sinks:
      langfuse:
        type: http
        inputs: [to_langfuse]
        uri: "http://langfuse.corp.lan/api/public/ingestion"
        method: post
        auth:
          strategy: basic
          user: "${LANGFUSE_PUBLIC_KEY}"
          password: "${LANGFUSE_SECRET_KEY}"
        encoding:
          codec: json
        buffer:
          type: disk
          max_size: 1073741824

      s3:
        type: aws_s3
        # Durable audit store gets the FLAT, gated, audit-only records (not the
        # Langfuse-reshaped envelope).
        inputs: [audit_only]
        bucket: {{ .Values.audit.sinks.s3.bucket | quote }}
        key_prefix: "{{ "{{ team_id }}" }}/dt=%Y-%m-%d/"
        compression: gzip
        encoding:
          codec: json
        buffer:
          type: disk
          max_size: 5368709120
{{- if .Values.audit.sinks.siem.enabled }}
      siem:
        type: http
        # Inherits the NEVER-fields gate (audit_only ← enforce_audit_schema).
        # Endpoint pending open Q#3; update in values once SIEM target is confirmed.
        inputs: [audit_only]
        uri: {{ .Values.audit.sinks.siem.endpoint | quote }}
        method: post
        encoding:
          codec: {{ .Values.audit.sinks.siem.encoding }}
        buffer:
          type: disk
          max_size: 1073741824
{{- end }}
