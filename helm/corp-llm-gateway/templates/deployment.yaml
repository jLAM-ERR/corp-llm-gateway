apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corp-llm-gateway.fullname" . }}
  labels:
    {{- include "corp-llm-gateway.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "corp-llm-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "corp-llm-gateway.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "corp-llm-gateway.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.configCheck.enabled }}
      initContainers:
        # Fail fast on a misconfigured deploy: run `gateway-admin config check`
        # at pod start instead of 503-ing on the first request. Same image + env
        # + Secret as the gateway container. Default args `--no-probe` validate
        # config only; the readiness deep-check gates on live dependency health.
        - name: config-check
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["gateway-admin", "config", "check"]
          {{- with .Values.configCheck.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "corp-llm-gateway.gatewayEnv" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ include "corp-llm-gateway.secretName" . }}
          {{- if .Values.caBundle.enabled }}
          volumeMounts:
            - name: ca-bundle
              mountPath: {{ .Values.caBundle.mountPath }}
              readOnly: true
          {{- end }}
      {{- end }}
      containers:
        - name: litellm
          # The gateway server image (litellm proxy + guardrail callback), NOT
          # stock berriai/litellm — the stock image never loads the guardrail.
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            {{- include "corp-llm-gateway.gatewayEnv" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ include "corp-llm-gateway.secretName" . }}
          startupProbe:
            httpGet:
              path: /healthz/live
              port: http
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
          volumeMounts:
            - name: litellm-config
              mountPath: /etc/litellm
              readOnly: true
            {{- if .Values.caBundle.enabled }}
            - name: ca-bundle
              mountPath: {{ .Values.caBundle.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
        - name: vector
          image: "timberio/vector:0.40.0-alpine"
          args: ["--config", "/etc/vector/vector.yaml"]
          # The log shipper reads the node's pod logs; it must run as root to read
          # /var/log/pods (a standard log-agent requirement) while the gateway
          # container above stays non-root.
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          # Langfuse (${LANGFUSE_*}) + S3 (AWS_*) sink creds come from the Secret.
          envFrom:
            - secretRef:
                name: {{ include "corp-llm-gateway.secretName" . }}
          volumeMounts:
            - name: vector-config
              mountPath: /etc/vector
            - name: vector-buffer
              mountPath: /var/lib/vector
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: litellm-config
          # items: litellm resolves callbacks as a file under the config dir, so the
          # shim must land at corp_llm_gateway/bootstrap.py; both keys are listed
          # because configMap.items projection is selective (unlisted keys vanish).
          configMap:
            name: {{ include "corp-llm-gateway.fullname" . }}-litellm
            items:
              - key: config.yaml
                path: config.yaml
              - key: bootstrap.py
                path: corp_llm_gateway/bootstrap.py
        - name: vector-config
          configMap:
            name: {{ include "corp-llm-gateway.fullname" . }}-vector
        - name: vector-buffer
          emptyDir:
            sizeLimit: {{ .Values.audit.vector.bufferGb }}Gi
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlog
          hostPath:
            path: /var/log
        {{- if .Values.caBundle.enabled }}
        - name: ca-bundle
          secret:
            secretName: {{ .Values.caBundle.existingSecret | default (printf "%s-ca" (include "corp-llm-gateway.fullname" .)) }}
        {{- end }}
