{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "corp-llm-gateway.serviceAccountName" . }}
  labels:
    {{- include "corp-llm-gateway.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .Values.rbac.create }}
---
# Pod-metadata read for the Vector sidecar's `kubernetes_logs` source (it enriches
# each log event from the API and lists pods on the node). Scoped read-only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "corp-llm-gateway.fullname" . }}-vector-logs
  labels:
    {{- include "corp-llm-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "corp-llm-gateway.fullname" . }}-vector-logs
  labels:
    {{- include "corp-llm-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "corp-llm-gateway.fullname" . }}-vector-logs
subjects:
  - kind: ServiceAccount
    name: {{ include "corp-llm-gateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
