{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "corp-llm-gateway.fullname" . }}
  labels:
    {{- include "corp-llm-gateway.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "corp-llm-gateway.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  # CPU-only pods (no GPU); scale out for the capacity.md 10x burst rather than up.
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
